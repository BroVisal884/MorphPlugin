name: Build MorphPlugin
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip source
        run: unzip MorphPlugin-clean-2.zip
      - name: Download LibsDisguises
        run: |
          mkdir -p MorphPlugin/libs
          curl -L "https://github.com/libraryaddict/LibsDisguises/releases/download/v10.0.44/LibsDisguises-v10.0.44.jar" -o MorphPlugin/libs/LibsDisguises.jar
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: cd MorphPlugin && mvn clean package -DskipTests
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: MorphPlugin-JAR
          path: MorphPlugin/target/MorphPlugin-*.jar
