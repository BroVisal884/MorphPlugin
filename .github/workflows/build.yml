name: Build VisalMCPlugin
# v2

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: unzip VisalMCPlugin-Source.zip

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: cd VisalMCPlugin && mvn clean package -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: VisalMCPlugin-JAR
          path: VisalMCPlugin/target/VisalMCPlugin-*.jar
