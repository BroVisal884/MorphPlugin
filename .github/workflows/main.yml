name: Build MorphPlugin
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Unzip source
        run: unzip MorphPlugin-source.zip -d .
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: cd MorphPlugin && mvn clean package -DskipTests
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: MorphPlugin-JAR
          path: MorphPlugin/target/MorphPlugin-*.jar
